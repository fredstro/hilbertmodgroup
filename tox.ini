###
### tox.ini with parts taken from the sagemath source
###
[tox]
envlist = doctest, coverage, ruff, pycodestyle, relint, codespell, passagemath
requires =
     tox>=4.12

[testenv]
skipsdist = true
setenv =
    SAGE=sage
    HOME={toxinidir}
commands = tox -c {toxinidir}/tox.ini -e {envname} -- {posargs}
allowlist_externals =
    {env:SAGE}
    tox

[testenv:passagemath]
# CI-only environment: runs doctests using passagemath doctest runner.
# Requires passagemath to be system-installed (e.g., in Docker).
# Locally, use `tox -e doctest` instead, or run directly:
#   python -m sage.doctest -p --force-lib --environment=_doctest_environment src/
package = skip
sitepackages = True

allowlist_externals =
    bash
    sage

passenv =
    GITHUB_ACTIONS

commands =
    python -m sage.doctest -p --force-lib --environment=_doctest_environment {posargs:{toxinidir}/src/}

[testenv:doctest]
description =
   run Sage the Sage doctester (same as "sage -t")
package = skip
allowlist_externals =
    {env:SAGE:sage}
setenv =
    SAGE={env:SAGE:sage}
    HOME={toxinidir}
commands =
    {env:SAGE} -t -p 0 --force-lib {posargs:{toxinidir}/src/} {posargs:{toxinidir}/examples}

[testenv:coverage]
description =
    require 100% doctest coverage of all functions
    (same as "sage --coverage[all]")
package = skip
allowlist_externals =
    bash
commands =
    bash -c '{env:SAGE} --coverage {posargs:{toxinidir}/src/} {posargs:{toxinidir}/examples} 2>&1 | tee /dev/stderr | grep "^SCORE" | grep -v "100.0%" && echo "FAILED: not all files have 100% doctest coverage" && exit 1 || exit 0'

[testenv:ruff]
description =
    Check code style and quality with ruff.
package = skip
deps = ruff
commands = ruff check {posargs:{toxinidir}/src/} {posargs:{toxinidir}/examples}

[pycodestyle]
max-line-length = 160
statistics = True
count = True
ignore = E225, E501

[testenv:pycodestyle]
description =
    Check PEP8 style for Cython files.
package = skip
deps = pycodestyle
allowlist_externals = pycodestyle
commands = pycodestyle --filename="*.pyx" {posargs:{toxinidir}/src/}

[testenv:relint]
description =
    check whether some forbidden patterns appear
    (includes all patchbot pattern-exclusion plugins)
# https://github.com/codingjoe/relint
# The patterns are in .relint.yaml
package = skip
deps = relint
allowlist_externals = find
commands = find {posargs:{toxinidir}/src/} {posargs:{toxinidir}/examples} -exec relint -c {toxinidir}/.relint.yaml \{\} +

[testenv:codespell]
description =
    check for misspelled words in source code
# https://pypi.org/project/codespell/
package = skip
deps = codespell
commands = codespell \
    --skip="*.so,*.c,*.cpp,.git,.idea,.ipynb_checkpoints,.tox,dist,*.egg-info" \
    --ignore-regex=[A-Za-z0-9+/]{200,} \
           --dictionary=- \
    {posargs:{toxinidir}/src} {posargs:{toxinidir}/examples}

[testenv:rst]
description =
    validate Python docstrings markup as reStructuredText
package = skip
deps = restructuredtext-lint
commands = rst-lint {posargs:{toxinidir}/docs/}
